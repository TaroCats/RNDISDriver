name: RNDISDriver
options:
  bundleIdPrefix: com.taro
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

targets:
  RNDISApp:
    type: application
    platform: macOS
    sources:
      - path: RNDISApp
    settings:
      base:
        INFOPLIST_FILE: RNDISApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.taro.rndisapp
        CODE_SIGN_ENTITLEMENTS: ""
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
    dependencies:
      - target: RNDISDriver

  RNDISDriver:
    type: driverkit-extension
    platform: macOS
    sources:
      - path: RNDISDriver
    settings:
      base:
        INFOPLIST_FILE: RNDISDriver/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.taro.rndisdriver
        CODE_SIGN_ENTITLEMENTS: RNDISDriver.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DRIVERKIT_DEPLOYMENT_TARGET: "23.0"
    preBuildScripts:
      - name: "DriverKit Framework Search Path"
        script: |
          # Ensure DriverKit framework is findable
          echo "SDKROOT: ${SDKROOT}"
    buildSettings:
      SYSTEM_DRIVERKIT_DEPLOYMENT_TARGET: "23.0"
