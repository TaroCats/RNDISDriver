name: Build RNDISDriver

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      enable_release:
        description: 'Enable release job (requires secrets)'
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: Build dext
    runs-on: macos-26
    strategy:
      matrix:
        configuration: [Debug, Release]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode & detect SDK
        run: |
          sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer
          xcodebuild -version
          DRIVERKIT_SDK=$(xcodebuild -showsdks 2>/dev/null | grep -oE 'driverkit[0-9.]*' | head -1)
          if [ -z "$DRIVERKIT_SDK" ]; then
            echo "ERROR: No DriverKit SDK found"
            exit 1
          fi
          echo "DRIVERKIT_SDK=$DRIVERKIT_SDK" >> $GITHUB_ENV
          echo "Using SDK: $DRIVERKIT_SDK"

      - name: Build (${{ matrix.configuration }} / unsigned)
        run: |
          xcodebuild \
            -project RNDISDriver.xcodeproj \
            -scheme RNDISDriver \
            -configuration ${{ matrix.configuration }} \
            -sdk "$DRIVERKIT_SDK" \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Verify dext binary
        run: |
          PRODUCT_DIR=$(xcodebuild \
            -project RNDISDriver.xcodeproj \
            -scheme RNDISDriver \
            -configuration ${{ matrix.configuration }} \
            -sdk "$DRIVERKIT_SDK" \
            -derivedDataPath build \
            -showBuildSettings 2>/dev/null \
            | grep " BUILT_PRODUCTS_DIR = " \
            | head -1 \
            | sed 's/.*= //')
          if [ -z "$PRODUCT_DIR" ]; then
            echo "ERROR: Failed to get build settings"
            exit 1
          fi
          echo "=== dext binary info ==="
          file "$PRODUCT_DIR/RNDISDriver.dext/RNDISDriver"
          echo "=== Info.plist ==="
          plutil -p "$PRODUCT_DIR/RNDISDriver.dext/Info.plist"

  lint:
    name: Lint plist & entitlements
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Info.plist
        run: plutil -lint RNDISDriver/Info.plist

      - name: Validate App Info.plist
        run: plutil -lint RNDISApp/Info.plist

      - name: Validate entitlements
        run: plutil -lint RNDISDriver.entitlements

  release:
    name: Release (signed + notarized)
    runs-on: macos-26
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.enable_release == 'true'
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode & detect SDK
        run: |
          sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer
          xcodebuild -version
          DRIVERKIT_SDK=$(xcodebuild -showsdks 2>/dev/null | grep -oE 'driverkit[0-9.]*' | head -1)
          if [ -z "$DRIVERKIT_SDK" ]; then
            echo "ERROR: No DriverKit SDK found"
            exit 1
          fi
          echo "DRIVERKIT_SDK=$DRIVERKIT_SDK" >> $GITHUB_ENV
          echo "Using SDK: $DRIVERKIT_SDK"

      - name: Import Developer Certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}

      - name: Build (Release / signed)
        run: |
          xcodebuild \
            -project RNDISDriver.xcodeproj \
            -scheme RNDISDriver \
            -configuration Release \
            -sdk "$DRIVERKIT_SDK" \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            build

      - name: Archive dext for notarization
        run: |
          PRODUCT_DIR=$(xcodebuild \
            -project RNDISDriver.xcodeproj \
            -scheme RNDISDriver \
            -configuration Release \
            -sdk "$DRIVERKIT_SDK" \
            -derivedDataPath build \
            -showBuildSettings 2>/dev/null \
            | grep " BUILT_PRODUCTS_DIR = " \
            | head -1 \
            | sed 's/.*= //')
          mkdir -p artifacts
          cp -R "$PRODUCT_DIR/RNDISDriver.dext" artifacts/
          ditto -c -k --keepParent artifacts/RNDISDriver.dext artifacts/RNDISDriver.dext.zip

      - name: Notarize (xcrun notarytool)
        run: |
          xcrun notarytool submit artifacts/RNDISDriver.dext.zip \
            --apple-id "${{ secrets.APPLE_NOTARIZATION_USERNAME }}" \
            --password "${{ secrets.APPLE_NOTARIZATION_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_NOTARIZATION_TEAM_ID }}" \
            --wait

      - name: Staple notarization ticket
        run: |
          xcrun stapler staple artifacts/RNDISDriver.dext

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RNDISDriver-signed
          path: artifacts/
